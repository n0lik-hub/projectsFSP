spring.application.name=bonus-arena

# Server Configuration
server.port=8080

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:bonusarena
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# WebSocket Configuration
spring.websocket.max-text-message-size=65536

# Logging
logging.level.com.stoloto.bonusarena=DEBUG
logging.level.org.springframework.web.socket=DEBUG

# Game Configuration
game.default.entry-cost=100
game.default.boost-cost=50
game.default.boost-multiplier=2.0
game.default.room-size=10
game.default.wait-time-seconds=60
game.default.prize-pool-percent=90
